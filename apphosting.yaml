# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  maxInstances: 1
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

  # Environment variables and secrets.
  # env:
  # Configure environment variables.
  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  # - variable: MESSAGE
  #   value: Hello world!
  #   availability:
  #     - BUILD
  #     - RUNTIME

  # Grant access to secrets in Cloud Secret Manager.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  # - variable: MY_SECRET
  #   secret: mySecretRef
env:
  - variable: QIITA_ACCESS_TOKEN
    secret: QIITA_ACCESS_TOKEN
  - variable: MICRO_CMS_API_KEY
    secret: MICRO_CMS_API_KEY
  - variable: QIITA_API_BASE_URL
    value: https://qiita.com/api/v2
  - variable: MICRO_CMS_API_BASE_URL
    value: https://t4vqxjujxd.microcms.io/api/v1
